pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def propertiesFile = new File(settingsDir, '../local.properties')
        if (propertiesFile.exists()) {
            propertiesFile.withReader('UTF-8') { reader -> properties.load(reader) }
        }
        // 🔥 السر هنا: إذا لم يجد الملف المحلي (مثل السيرفر)، يسحب المسار من بيئة النظام أونلاين فوراً!
        def sdkPath = properties.getProperty('flutter.sdk') ?: System.getenv('FLUTTER_HOME')
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
}

include ':app'