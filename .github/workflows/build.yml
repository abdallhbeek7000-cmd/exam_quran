name: Build and Release Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. سحب الكود (تم التحديث لـ v4 لإخفاء التحذير الأصفر)
      - uses: actions/checkout@v4

      # 2. تهيئة الجافا (تم التحديث لـ v4 لإخفاء التحذير الأصفر)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تثبيت الفلاتر سحابياً
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.x'

      # 4. استخراج المسار الفعلي للفلاتر من النظام
      - name: Generate local.properties for GitHub Server
        run: |
          FLUTTER_PATH=$(dirname $(dirname $(which flutter)))
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_PATH" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties

      # 5. سحب المكاتب
      - name: Get Dependencies
        run: flutter pub get

      # 6. بناء الـ APK
      - name: Build APK
        run: flutter build apk --release

      # 7. 🎯 التعديل الجديد: رفع الـ APK كـ Artifact ليظهر في أسفل صفحة الـ Summary
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-exam-app-release
          path: build/app/outputs/flutter-apk/app-release.apk