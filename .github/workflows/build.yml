name: Build and Release Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب كود المشروع من غيت هاب
      - uses: actions/checkout@v3

      # 2. تهيئة لغة الجافا الضرورية لبناء الأندرويد
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تثبيت الفلاتر سحابياً (هذا السطر هو السحر اللي بيمرر المسار تلقائياً للأندرويد)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # لتسريع البناء في المرات القادمة

      # 4. سحب مكاتب الفايربيز والقرآن
      - name: Get Dependencies
        run: flutter pub get

      # 5. أمر البناء السحري اللي بيولد الـ APK فوراً
      - name: Build APK
        run: flutter build apk --release

      # 6. رفع الـ APK لقسم الـ Releases أونلاين
      - name: Upload APK to Releases
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: v1.0.0
          name: الإصدار الأول الجاهز للتثبيت 📱
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}