name: Build and Release Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب الكود
      - uses: actions/checkout@v3

      # 2. تهيئة الجافا
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تثبيت الفلاتر سحابياً
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.x'

      # 4. 🎯 السر اللي عملناه بالتطبيقات التانية: توليد ملف local.properties في السيرفر تلقائياً!
      - name: Generate local.properties for GitHub Server
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_HOME" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties

      # 5. سحب المكاتب
      - name: Get Dependencies
        run: flutter pub get

      # 6. بناء الـ APK
      - name: Build APK
        run: flutter build apk --release

      # 7. الرفع لقسم الـ Releases
      - name: Upload APK to Releases
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: v1.0.2
          name: إصدار التطبيق المستقر 📖
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}