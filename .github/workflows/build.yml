name: Build and Release Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب كود المشروع من غيت هاب
      - uses: actions/checkout@v3

      # 2. تهيئة الجافا الضرورية لبناء الأندرويد
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. 🎯 السطر السحري اللي حل المشكلة سابقاً: تثبيت الفلاتر وتجهيز المسارات للسيرفر تلقائياً!
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. سحب المكاتب والاعتمادات للمشروع
      - name: Get Dependencies
        run: flutter pub get

      # 5. أمر بناء نسخة الـ APK النهائية
      - name: Build APK
        run: flutter build apk --release

      # 6. رفع الـ APK الجاهز مباشرة لقسم الـ Releases
      - name: Upload APK to Releases
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: v1.0.0
          name: الإصدار الجاهز للتثبيت 📱
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}